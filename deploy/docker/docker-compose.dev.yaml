version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: dev123456
      MYSQL_DATABASE: sankaer
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
    volumes:
      - mysql-data:/var/lib/mysql
      - ../../server/migrations:/docker-entrypoint-initdb.d

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  redis-data:
  mysql-data:
