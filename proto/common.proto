syntax = "proto3";
package sankaer;
option go_package = "sankaer/internal/pkg/pb";

// 消息包头
message Packet {
    uint32 msg_type = 1;   // 消息类型ID
    uint32 seq      = 2;   // 序列号（ACK用）
    bytes  payload  = 3;   // 消息体
}

// 花色
enum Suit {
    SUIT_UNKNOWN = 0;
    SPADE   = 1;  // 黑桃
    HEART   = 2;  // 红心
    DIAMOND = 3;  // 方块
    CLUB    = 4;  // 梅花
    JOKER   = 5;  // 王牌
}

// 牌
message Card {
    Suit   suit = 1;
    uint32 rank = 2;  // 1-13, 14=小王, 15=大王
}

// 玩家信息
message PlayerInfo {
    string user_id   = 1;
    string nickname  = 2;
    string avatar    = 3;
    uint32 seat_idx  = 4;   // 座位号 0-4
    bool   is_ready  = 5;
    bool   is_online = 6;
    string platform  = 7;   // wechat / web / android / ios / desktop
}
